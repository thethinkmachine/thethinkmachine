  <text x="460" y="381" font-family="monospace" font-size="15" fill="#5fd4f0" font-weight="bold" text-anchor="middle" xml:space="preserve">Ozymandias</text>
  <text x="460" y="400" font-family="monospace" font-size="11" fill="#7c8696" font-style="italic" text-anchor="middle" xml:space="preserve">Percy Bysshe Shelley</text>
  <text x="460" y="438" font-family="monospace" font-size="12" fill="#dde3ec" font-style="italic" text-anchor="middle" xml:space="preserve">I met a traveller from an antique land</text>
  <text x="460" y="457" font-family="monospace" font-size="12" fill="#dde3ec" font-style="italic" text-anchor="middle" xml:space="preserve">Who said: Two vast and trunkless legs of stone</text>
  <text x="460" y="476" font-family="monospace" font-size="12" fill="#dde3ec" font-style="italic" text-anchor="middle" xml:space="preserve">Stand in the desert. Near them, on the sand,</text>
  <text x="460" y="495" font-family="monospace" font-size="12" fill="#dde3ec" font-style="italic" text-anchor="middle" xml:space="preserve">Half sunk, a shattered visage lies, whose frown,</text>
  <text x="460" y="514" font-family="monospace" font-size="12" fill="#dde3ec" font-style="italic" text-anchor="middle" xml:space="preserve">And wrinkled lip, and sneer of cold command,</text>
  <text x="460" y="533" font-family="monospace" font-size="12" fill="#dde3ec" font-style="italic" text-anchor="middle" xml:space="preserve">Tell that its sculptor well those passions read</text>
  <text x="460" y="552" font-family="monospace" font-size="12" fill="#dde3ec" font-style="italic" text-anchor="middle" xml:space="preserve">Which yet survive, stamped on these lifeless things,</text>
  <text x="460" y="571" font-family="monospace" font-size="12" fill="#dde3ec" font-style="italic" text-anchor="middle" xml:space="preserve">The hand that mocked them, and the heart that fed:</text>
  <text x="460" y="590" font-family="monospace" font-size="12" fill="#dde3ec" font-style="italic" text-anchor="middle" xml:space="preserve">And on the pedestal these words appear:</text>
  <text x="460" y="609" font-family="monospace" font-size="12" fill="#dde3ec" font-style="italic" text-anchor="middle" xml:space="preserve">‘My name is Ozymandias, king of kings:</text>
  <text x="460" y="628" font-family="monospace" font-size="12" fill="#dde3ec" font-style="italic" text-anchor="middle" xml:space="preserve">Look on my works, ye Mighty, and despair!’</text>
  <text x="460" y="647" font-family="monospace" font-size="12" fill="#dde3ec" font-style="italic" text-anchor="middle" xml:space="preserve">Nothing beside remains. Round the decay</text>
  <text x="460" y="666" font-family="monospace" font-size="12" fill="#dde3ec" font-style="italic" text-anchor="middle" xml:space="preserve">Of that colossal wreck, boundless and bare</text>
  <text x="460" y="685" font-family="monospace" font-size="12" fill="#dde3ec" font-style="italic" text-anchor="middle" xml:space="preserve">The lone and level sands stretch far away.</text>
</svg>