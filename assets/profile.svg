  <text x="460" y="331" font-family="monospace" font-size="15" fill="#57c464" font-weight="bold" text-anchor="middle" xml:space="preserve">Ozymandias</text>
  <text x="460" y="350" font-family="monospace" font-size="11" fill="#8b949e" font-style="italic" text-anchor="middle" xml:space="preserve">Percy Bysshe Shelley</text>
  <text x="460" y="388" font-family="monospace" font-size="12" fill="#c9d1d9" font-style="italic" text-anchor="middle" xml:space="preserve">I met a traveller from an antique land</text>
  <text x="460" y="407" font-family="monospace" font-size="12" fill="#c9d1d9" font-style="italic" text-anchor="middle" xml:space="preserve">Who said: Two vast and trunkless legs of stone</text>
  <text x="460" y="426" font-family="monospace" font-size="12" fill="#c9d1d9" font-style="italic" text-anchor="middle" xml:space="preserve">Stand in the desert. Near them, on the sand,</text>
  <text x="460" y="445" font-family="monospace" font-size="12" fill="#c9d1d9" font-style="italic" text-anchor="middle" xml:space="preserve">Half sunk, a shattered visage lies, whose frown,</text>
  <text x="460" y="464" font-family="monospace" font-size="12" fill="#c9d1d9" font-style="italic" text-anchor="middle" xml:space="preserve">And wrinkled lip, and sneer of cold command,</text>
  <text x="460" y="483" font-family="monospace" font-size="12" fill="#c9d1d9" font-style="italic" text-anchor="middle" xml:space="preserve">Tell that its sculptor well those passions read</text>
  <text x="460" y="502" font-family="monospace" font-size="12" fill="#c9d1d9" font-style="italic" text-anchor="middle" xml:space="preserve">Which yet survive, stamped on these lifeless things,</text>
  <text x="460" y="521" font-family="monospace" font-size="12" fill="#c9d1d9" font-style="italic" text-anchor="middle" xml:space="preserve">The hand that mocked them, and the heart that fed:</text>
  <text x="460" y="540" font-family="monospace" font-size="12" fill="#c9d1d9" font-style="italic" text-anchor="middle" xml:space="preserve">And on the pedestal these words appear:</text>
  <text x="460" y="559" font-family="monospace" font-size="12" fill="#c9d1d9" font-style="italic" text-anchor="middle" xml:space="preserve">‘My name is Ozymandias, king of kings:</text>
  <text x="460" y="578" font-family="monospace" font-size="12" fill="#c9d1d9" font-style="italic" text-anchor="middle" xml:space="preserve">Look on my works, ye Mighty, and despair!’</text>
  <text x="460" y="597" font-family="monospace" font-size="12" fill="#c9d1d9" font-style="italic" text-anchor="middle" xml:space="preserve">Nothing beside remains. Round the decay</text>
  <text x="460" y="616" font-family="monospace" font-size="12" fill="#c9d1d9" font-style="italic" text-anchor="middle" xml:space="preserve">Of that colossal wreck, boundless and bare</text>
  <text x="460" y="635" font-family="monospace" font-size="12" fill="#c9d1d9" font-style="italic" text-anchor="middle" xml:space="preserve">The lone and level sands stretch far away.</text>
</svg>